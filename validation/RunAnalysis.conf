# ============================================================
# RunAnalysis.conf
#
# External configuration consumed by RunAnalysis.C via TEnv.
#
# Run with this file (from this directory):
#   root -l -q RunAnalysis.C
#
# Or pass an explicit path:
#   root -l -q 'RunAnalysis.C("/path/to/RunAnalysis.conf")'
# ============================================================

# -------------------------
# I/O and processing
# -------------------------
io.inputFilePrefix: reco.edm4hep.root
io.outputDir: ./
io.nThreads: 10
io.trackBranch: SiTrack
io.isSubsetCollection: 1
io.seedBranch: SeedTracks
io.nThreadsTracks: 10
io.nThreadsSeeds: 10
io.nThreadsHits: 10

# -------------------------
# Event-level selection
# -------------------------
# Keep event if at least one primary MC particle passes all enabled cuts.
# Use theta OR absEta windows for angular selection (avoid double-cutting).
event.ptMin: 0.0
event.ptMax: 3.4028235e+38
event.thetaMin: 0.0
event.thetaMax: 3.141592653589793
event.absEtaMin: 0.0
event.absEtaMax: 3.4028235e+38

# -------------------------
# Track-level selection
# -------------------------
# Track must pass all enabled cuts.
# Use theta OR absEta windows for angular selection (avoid double-cutting).
track.ptMin: 0.5
track.ptMax: 3.4028235e+38
track.thetaMin: 0.0
track.thetaMax: 3.141592653589793
track.absEtaMin: 0.0
track.absEtaMax: 3.4028235e+38
track.phiMin: -3.141592653589793
track.phiMax: 3.141592653589793
track.d0Min: -3.4028235e+38
track.d0Max: 3.4028235e+38
track.z0Min: -3.4028235e+38
track.z0Max: 3.4028235e+38
track.chi2Min: 0.0
track.chi2Max: 3.0
track.nHitsMin: 4
track.nHolesMax: 2147483647
