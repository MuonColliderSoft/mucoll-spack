    overlay:
      require: '@0.25.0.1'
    lcgeo:
      require: '@0.19.0.2'
    lcio:
      require: '@2.20.2.1'
    forwardtracking:
      require: '@1.14.2.1'
    conformaltracking:
      require: '@1.12.1.1'
    marlintrkprocessors:
      require: '@2.15.1.1'
    actstracking:
      require: '@1.2.0.2'

    gear:
      require: '@1.9.2'
    ilcutil:
      require: '@1.7.2'
    marlin:
      require: '@1.19.1'
    pandorapfa:
      require: '@4.8.1'
    gdb:
      require: '@14.1'

    all:
      target: [x86_64]
      variants: build_type=Release cxxstd=17
      buildable: true
      providers:
        gl: [mesa]
        glu: [mesa]
