spack:
  packages:
    all:
      target: [x86_64, aarch64]
      variants:
      - build_type=RelWithDebInfo
      - cxxstd=20
      buildable: true
      providers:
        gl: [mesa]
        glu: [mesa]
        
    llvm:
      buildable: False
      externals:
      - spec: llvm@16.0.6 +clang +lld
        prefix: /usr/lib/llvm-16

  concretizer:
    unify: true
    targets:
      host_compatible: true

  view: false

  include:
  - ../mucoll-common/packages.yaml

  specs:
  - mucoll-stack+devtools+pytools+ml
