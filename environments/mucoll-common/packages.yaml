packages:
  all:
    target: [x86_64, aarch64]
    variants: build_type=Release cxxstd=20
    buildable: true

  # Use the system OpenGL as recommended by spack
  # See https://github.com/key4hep/key4hep-spack/issues/318 and
  # https://github.com/key4hep/key4hep-spack/issues/516
  # A version is needed and we set it to 99 so that spack thinks it's the latest
  # (it may not work if the versions in the current system are not what's required
  # but that hasn't happened yet)
  opengl:
    buildable: False
    externals:
    - spec: opengl@99
      prefix: /usr
  openglu:
    buildable: False
    externals:
    - spec: openglu@99
      prefix: /usr
  mesa:
    buildable: False
    externals:
    - spec: mesa@99
      prefix: /usr
  mesa-glu:
    buildable: False
    externals:
    - spec: mesa-glu@99
      prefix: /usr
 # Use the system kerberos, otherwise the tickets obtained at login with the
  # system version don't appear for the spack kerberos (happening on lxplus at least)
  krb5:
    buildable: False
    externals:
    - spec: krb5@99
      prefix: /usr
  # Use the system ssh, otherwise the configuration for the provided ssh will likely be
  # different and things like ssh using kerberos won't work (by extension authentication
  # for git with ssh with kerberos)
  openssh:
    buildable: False
    externals:
    - spec: openssh@99
      prefix: /usr

  # Take external llvm as it won't compile within 6 hours limit
  # llvm@20 (not a newer major) because py-llvmlite (via py-numba, pulled in by
  # acorn) caps at llvm@20; the rest of the stack has no hard llvm version need.
  llvm:
    buildable: False
    externals:
    - spec: llvm@20.1.8 +clang +lld
      prefix: /usr/lib/llvm-20

  # needed by Alma9 to support AVX2 instructions
  binutils:
    require: +gas
  gdb:
    require: +python+tui+source-highlight~debuginfod

  py-pandas:
    require: ~excel~parquet

  k4fwcore:
    require: '@main'

  dd4hep:
    require: '+edm4hep+lcio+xercesc+hepmc3'
  # +gnn is intentionally NOT required globally: only the @gnn branch of
  # k4actstracking (used by the ml layer) needs the acts GNN plugin (and its
  # py-torch / onnxruntime deps). The sim layer concretizes acts~gnn.
  acts:
    # Temporarily pin acts@main to the last commit before the grid refactor
    # (acts-project/acts#5541, c36cd88cd, 2026-06-08) that broke compilation of
    # the CylindricalSpacePointGrid fill path: grid.atPosition(binIndex) now
    # resolves to the position-lookup overload (Point = std::size_t), so
    # MultiAxisHelper subscripts a scalar -> "subscripted value is neither array
    # nor pointer" when building k4actstracking. Revert to '@main' once acts
    # main is fixed upstream.
    require: '@main commit=0f9e9afe70b1e817f965dfda6dc7fa94376fbef6 +dd4hep+json cxxstd=20'
  k4geo:
    require: '@main'
  k4gaudipandora:
    require: '@main'
  k4reco:
    require: '@0.2'
  # NOTE: k4actstracking version is intentionally NOT pinned globally here.
  # The sim and ml layers require different branches (@calosurface-extrapolation
  # vs @gnn), so the version is constrained per-root in each environment's spec
  # list instead (a global require would make those per-root specs unsatisfiable).
  k4simgeant4:
    require: '@main'
  pyatlasify:
    require: '@master'

  muoncvxddigitiser:
    require: '@0.2.2'
  lccontent:
    require: +monitoring
