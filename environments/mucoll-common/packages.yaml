packages:
  all:
    target: [x86_64, aarch64]
    variants: build_type=Release cxxstd=20
    buildable: true

  # Use the system OpenGL as recommended by spack
  # See https://github.com/key4hep/key4hep-spack/issues/318 and
  # https://github.com/key4hep/key4hep-spack/issues/516
  # A version is needed and we set it to 99 so that spack thinks it's the latest
  # (it may not work if the versions in the current system are not what's required
  # but that hasn't happened yet)
  opengl:
    buildable: False
    externals:
    - spec: opengl@99
      prefix: /usr
  openglu:
    buildable: False
    externals:
    - spec: openglu@99
      prefix: /usr
  mesa:
    buildable: False
    externals:
    - spec: mesa@99
      prefix: /usr
  mesa-glu:
    buildable: False
    externals:
    - spec: mesa-glu@99
      prefix: /usr
 # Use the system kerberos, otherwise the tickets obtained at login with the
  # system version don't appear for the spack kerberos (happening on lxplus at least)
  krb5:
    buildable: False
    externals:
    - spec: krb5@99
      prefix: /usr
  # Use the system ssh, otherwise the configuration for the provided ssh will likely be
  # different and things like ssh using kerberos won't work (by extension authentication
  # for git with ssh with kerberos)
  openssh:
    buildable: False
    externals:
    - spec: openssh@99
      prefix: /usr

  # Take external llvm as it won't compile within 6 hours limit
  # llvm@20 (not a newer major) because py-llvmlite (via py-numba, pulled in by
  # acorn) caps at llvm@20; the rest of the stack has no hard llvm version need.
  llvm:
    buildable: False
    externals:
    - spec: llvm@20.1.8 +clang +lld
      prefix: /usr/lib/llvm-20

  boost:
    require: +python
    buildable: true

  # Ask for Python > 3.11
  # Since many packages depend on setuptools that was dropped in 3.12,
  # without asking explicitly the version used will be 3.11
  python:
    require: "@3.12: +optimizations"


  # needed by Alma9 to support AVX2 instructions
  binutils:
    require: +gas
  gdb:
    require: +python+tui+source-highlight~debuginfod

  xrootd:
    require: +krb5 cxxstd=20

  root:
    require: '@6.36: +davix+fftw+gsl+math+minuit+mlp+opengl~pythia8+python+r+roofit+root7+rpath~shadow+spectrum+sqlite+ssl+tbb+tmva+tmva-cpu+unuran+vc+vdt+webgui+x+xml+xrootd +ipo cxxstd=20'

  hdf5:
    require: +cxx+hl
  hepmc3:
    require: +python+rootio
  
  py-pandas:
    require: ~excel~parquet
  # Cap numpy at the numba-compatible ceiling (py-numba, pulled in via acorn in
  # the +sim layer, does not yet support numpy@2.3). Without this cap the sim
  # root concretizes numpy@2.2.6 (numba-limited) while the analysis root is free
  # to take numpy@2.3.x; under unify:when_possible those cannot share a hash, so
  # numpy AND everything depending on it (py-scipy, py-scikit-learn, py-xgboost)
  # get duplicated across the two layered roots. Pinning both roots to <=2.2
  # collapses that subtree to a single shared build. Use a ceiling (not an exact
  # pin) so patch updates within 2.2.x are picked up automatically.
  py-numpy:
    require: '@:2.2 ^openblas'

  # The pins below (py-sympy, eigen, py-fsspec, valgrind) exist for the SAME
  # reason as the numpy cap above: under unify:when_possible the lean analysis
  # root takes the newest version/variant of a shared package while the richer
  # +sim root is capped (by acts, acorn's ML deps, geant4, ...), so the two
  # roots cannot share a hash and the package -- plus everything above it -- is
  # duplicated. py-torch depends on ALL of py-sympy, eigen, py-fsspec and
  # valgrind, so each split forks the (expensive) py-torch/onnxruntime subtree.
  # Forcing one shared config collapses it to a single build per package.

  # sim caps sympy at 1.13.3 (via acorn -> py-torch-geometric / py-lightning);
  # analysis is free to take 1.14.0. py-torch (@2.7:) and py-onnxruntime both
  # accept 1.13.3, so pinning it unifies py-onnxruntime AND one py-torch edge.
  py-sympy:
    require: '@1.13.3'

  # sim caps eigen at the 3.4 series (acts does not support eigen@5); analysis
  # would otherwise take eigen@5.0.1. py-torch works with 3.4 (the sim root
  # proves it), so pin the 3.4 series everywhere.
  eigen:
    require: '@3.4'

  # sim pulls py-fsspec+http (acorn -> py-lightning / py-torch-geometric need
  # remote-dataset support); analysis takes ~http. Force +http so both agree;
  # this unifies py-uproot / py-awkward and another py-torch edge. The extra
  # py-aiohttp dependency is cheap.
  py-fsspec:
    require: '+http'

  # py-torch is built +valgrind, and valgrind is built +boost by default. boost
  # legitimately has two configs (a rich +filesystem/+program_options/... build
  # for the sim stack vs a lean build for analysis), which would otherwise be
  # dragged into py-torch through valgrind. Dropping valgrind's boost dependency
  # severs that amplifier so py-torch stays a single build; boost itself may
  # still have two (cheap) configs, but nothing expensive rides on the split.
  valgrind:
    require: '~boost'

  # Pin py-torch to the latest series. py-torch@2.9.1 is available and every
  # root concretizes to it individually, but under `unify: when_possible` the
  # solver's whole-DAG version optimization settles the *shared* py-torch on
  # 2.7.1: downgrading the single py-torch node lets several of its shared
  # dependencies stay at their newest preferred versions, which the solver
  # scores as a lower total penalty than keeping py-torch newest. There is no
  # hard conflict (forcing @2.9.1 concretizes fine), so a version floor that
  # excludes 2.7.1 is enough to let the newest release win. Use a floor (not an
  # exact pin) so future releases are picked up automatically.
  py-torch:
    require: '@2.8:~cuda+custom-protobuf'

  # The versions of py-onnx and py-onnxruntime should be consistent based on this table
  # https://onnxruntime.ai/docs/reference/compatibility.html#onnx-opset-support
  py-onnx:
    require: '@1.16:'
  py-onnxruntime:
    require: '@1.18:'
    
  geant4:
    require: ~opengl~qt~vecgeom~examples +ipo cxxstd=20

  edm4hep:
    require: '@main'

  k4fwcore:
    require: '@main'

  dd4hep:
    require: '+edm4hep+lcio+xercesc+hepmc3'
  acts:
    require: '@main+dd4hep+json cxxstd=20'
  # ~beampipe_stl: skip the network download of the FCC-ee MDI beampipe CAD,
  # which MuColl does not use (and which intermittently breaks the build). The
  # beampipe_stl variant is added by the packages/k4geo overlay; the rest mirrors
  # upstream key4hep/k4geo@main.
  k4geo:
    require: '@main ~beampipe_stl'
  k4gen:
    require: '@main'
  k4gaudipandora:
    require: '@main'
  k4reco:
    require: '@main'
  k4marlinwrapper:
    require: '@main'
  k4edm4hep2lcioconv:
    require: '@main'
  k4actstracking:
    require: '@gnn+gnn'
  k4simgeant4:
    require: '@main'
  # The latest release (00-07-06) fails to build against k4fwcore@main: it still
  # includes k4FWCore/PodioDataSvc.h, which has been removed upstream. main tracks
  # the current k4fwcore API and compiles cleanly, so pin it until a release catches up.
  k4simdelphes:
    require: '@main'
  pyatlasify:
    require: '@master'

  lccontent:
    require: +monitoring
