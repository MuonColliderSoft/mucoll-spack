name: Build MuColl Stack and Publish Image
description: |
  Publish mucoll software stack docker image.
  This workflow relies on a spack cache.

on:
  # Build/publish the image when changes land on main; run on pull requests (so
  # the required checks report on PRs); allow manual runs via the "Run workflow"
  # button. No push trigger on other branches -- use dispatch for those.
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:

concurrency:
  # Key on the branch name so repeated PR pushes / manual runs for the same branch
  # don't pile up -- the later-started run cancels the earlier one. For PRs
  # github.head_ref is the source branch; otherwise we fall back to github.ref_name.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-sim-image:
    uses: ./.github/workflows/image-template.yaml
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu24]
    with:
      os: ${{ matrix.os }}
      registry: ghcr.io

  physics-validation:
    needs: build-sim-image
    # Skip on fork PRs: the image isn't published there, so there is nothing to
    # validate (fork PRs build the image but cannot push it).
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    strategy:
      fail-fast: false
      matrix:
        # Particle label is inferred from the PDG id in the template.
        pdg:
          - "13"    # muon
          - "11"   # electron
          - "211"  # pion
          - "22"   # photon
    uses: ./.github/workflows/physics-validation-template.yaml
    with:
      image: ${{ needs.build-sim-image.outputs.image }}
      pdg: ${{ matrix.pdg }}

  deploy-pages:
    needs: physics-validation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Collect per-particle plot fragments
        uses: actions/download-artifact@v4
        with:
          pattern: pages-*
          path: public
          merge-multiple: true
      - name: Generate landing page
        run: |
          cd public
          {
            echo '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">'
            echo '<title>MuColl physics validation</title></head><body>'
            echo '<h1>MuColl physics validation</h1><ul>'
            for d in */ ; do [ -d "$d" ] && echo "<li><a href=\"${d}\">${d%/}</a></li>"; done
            echo '</ul></body></html>'
          } > index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
