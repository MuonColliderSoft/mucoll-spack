name: Build MuColl Stack and Publish Image
description: |
  Publish the layered mucoll software stack docker images:
  mucoll-analysis -> mucoll-reco -> mucoll-sim -> mucoll-ml.
  Each layer is built FROM the previous one (per architecture) so packages are
  installed once and reused down the chain. Relies on a spack buildcache.

on:
  # Build/publish the image when changes land on main; run on pull requests (so
  # the required checks report on PRs); allow manual runs via the "Run workflow"
  # button. No push trigger on other branches -- use dispatch for those.
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:

concurrency:
  # Key on the branch name so repeated PR pushes / manual runs for the same branch
  # don't pile up -- the later-started run cancels the earlier one. For PRs
  # github.head_ref is the source branch; otherwise we fall back to github.ref_name.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- analysis --
  analysis-amd64:
    uses: ./.github/workflows/docker-build-push-template.yaml
    with:
      os: ubuntu24
      runner: ubuntu-latest
      platform: amd64
      registry: ghcr.io
      image-type: analysis
      dockerfile: Dockerfile.base
      spec: mucoll-stack~devtools+pytools+analysis~reco~sim~ml

  analysis-arm64:
    uses: ./.github/workflows/docker-build-push-template.yaml
    with:
      os: ubuntu24
      runner: ubuntu-24.04-arm
      platform: arm64
      registry: ghcr.io
      image-type: analysis
      dockerfile: Dockerfile.base
      spec: mucoll-stack~devtools+pytools+analysis~reco~sim~ml

  # -------------------------------------------------------------------- reco --
  # Built FROM analysis; +reco installs the reconstruction packages (carrying
  # Geant4 libraries but no physics data -- geant4~data, k4geo~geant4).
  reco-amd64:
    needs: analysis-amd64
    uses: ./.github/workflows/docker-build-push-template.yaml
    with:
      os: ubuntu24
      runner: ubuntu-latest
      platform: amd64
      registry: ghcr.io
      image-type: reco
      dockerfile: Dockerfile.layer
      base-image: ${{ needs.analysis-amd64.outputs.image-uri }}
      spec: mucoll-stack~devtools+pytools+analysis+reco~sim~ml

  reco-arm64:
    needs: analysis-arm64
    uses: ./.github/workflows/docker-build-push-template.yaml
    with:
      os: ubuntu24
      runner: ubuntu-24.04-arm
      platform: arm64
      registry: ghcr.io
      image-type: reco
      dockerfile: Dockerfile.layer
      base-image: ${{ needs.analysis-arm64.outputs.image-uri }}
      spec: mucoll-stack~devtools+pytools+analysis+reco~sim~ml

  # --------------------------------------------------------------------- sim --
  # Built FROM reco; +sim adds the simulation packages (dd4hep, delphes) on top
  # of reconstruction, with the full geant4+data / k4geo+geant4 for ddsim.
  sim-amd64:
    needs: reco-amd64
    uses: ./.github/workflows/docker-build-push-template.yaml
    with:
      os: ubuntu24
      runner: ubuntu-latest
      platform: amd64
      registry: ghcr.io
      image-type: sim
      dockerfile: Dockerfile.layer
      base-image: ${{ needs.reco-amd64.outputs.image-uri }}
      spec: mucoll-stack~devtools+pytools+analysis+reco+sim~ml

  sim-arm64:
    needs: reco-arm64
    uses: ./.github/workflows/docker-build-push-template.yaml
    with:
      os: ubuntu24
      runner: ubuntu-24.04-arm
      platform: arm64
      registry: ghcr.io
      image-type: sim
      dockerfile: Dockerfile.layer
      base-image: ${{ needs.reco-arm64.outputs.image-uri }}
      spec: mucoll-stack~devtools+pytools+analysis+reco+sim~ml

  # ---------------------------------------------------------------------- ml --
  ml-amd64:
    needs: sim-amd64
    uses: ./.github/workflows/docker-build-push-template.yaml
    with:
      os: ubuntu24
      runner: ubuntu-latest
      platform: amd64
      registry: ghcr.io
      image-type: ml
      dockerfile: Dockerfile.layer
      base-image: ${{ needs.sim-amd64.outputs.image-uri }}
      spec: mucoll-stack~devtools+pytools+analysis+reco+sim+ml

  ml-arm64:
    needs: sim-arm64
    uses: ./.github/workflows/docker-build-push-template.yaml
    with:
      os: ubuntu24
      runner: ubuntu-24.04-arm
      platform: arm64
      registry: ghcr.io
      image-type: ml
      dockerfile: Dockerfile.layer
      base-image: ${{ needs.sim-arm64.outputs.image-uri }}
      spec: mucoll-stack~devtools+pytools+analysis+reco+sim+ml

  # --------------------------------------------------------------- manifests --
  manifest-analysis:
    needs: [analysis-amd64, analysis-arm64]
    uses: ./.github/workflows/manifest-template.yaml
    with:
      os: ubuntu24
      registry: ghcr.io
      image-type: analysis
      amd64-image: ${{ needs.analysis-amd64.outputs.image-uri }}
      arm64-image: ${{ needs.analysis-arm64.outputs.image-uri }}

  manifest-reco:
    needs: [reco-amd64, reco-arm64]
    uses: ./.github/workflows/manifest-template.yaml
    with:
      os: ubuntu24
      registry: ghcr.io
      image-type: reco
      amd64-image: ${{ needs.reco-amd64.outputs.image-uri }}
      arm64-image: ${{ needs.reco-arm64.outputs.image-uri }}

  manifest-sim:
    needs: [sim-amd64, sim-arm64]
    uses: ./.github/workflows/manifest-template.yaml
    with:
      os: ubuntu24
      registry: ghcr.io
      image-type: sim
      amd64-image: ${{ needs.sim-amd64.outputs.image-uri }}
      arm64-image: ${{ needs.sim-arm64.outputs.image-uri }}

  manifest-ml:
    needs: [ml-amd64, ml-arm64]
    uses: ./.github/workflows/manifest-template.yaml
    with:
      os: ubuntu24
      registry: ghcr.io
      image-type: ml
      amd64-image: ${{ needs.ml-amd64.outputs.image-uri }}
      arm64-image: ${{ needs.ml-arm64.outputs.image-uri }}

  # ------------------------------------------------------ physics validation --
  physics-validation:
    # Run the sim -> digi -> reco -> plot chain against the freshly published
    # multi-arch sim image, gated on the successful sim manifest build.
    needs: manifest-sim
    # Skip on fork PRs: the image isn't pushed there, so there is nothing to pull
    # and validate (fork PRs build the image but cannot push it).
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    strategy:
      fail-fast: false
      matrix:
        # Particle label is inferred from the PDG id in the template.
        pdg:
          - "13"   # muon
          - "11"   # electron
          - "211"  # pion
          - "22"   # photon
    uses: ./.github/workflows/physics-validation-template.yaml
    with:
      image: ${{ needs.manifest-sim.outputs.image }}
      pdg: ${{ matrix.pdg }}

  deploy-pages:
    needs: physics-validation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Collect per-particle plot fragments
        uses: actions/download-artifact@v4
        with:
          pattern: pages-*
          path: public
          merge-multiple: true
      - name: Generate landing page
        run: |
          cd public
          shopt -s nullglob
          # make_plots.sh writes each gallery to <particle>/<settings-tag>/index.html,
          # so the landing page must link one level below the particle dir. Linking to
          # the particle dir alone 404s on Pages (no <particle>/index.html exists).
          {
            echo '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width, initial-scale=1">'
            echo '<title>MuColl physics validation</title>'
            echo '<style>body{font-family:system-ui,sans-serif;margin:1.5rem;color:#222}'
            echo 'h2{margin-top:1.5rem;font-size:1.1rem}code{font-size:.85em;word-break:break-all}</style>'
            echo '</head><body>'
            echo '<h1>MuColl physics validation</h1>'
            for particle in */ ; do
              p="${particle%/}"
              echo "<h2>${p}</h2><ul>"
              n=0
              for gallery in "${particle}"*/ ; do
                [ -f "${gallery}index.html" ] || continue
                tag="${gallery#"${particle}"}"; tag="${tag%/}"
                echo "<li><a href=\"${gallery}index.html\"><code>${tag}</code></a></li>"
                n=$((n + 1))
              done
              [ "${n}" -eq 0 ] && echo '<li><em>no plots produced</em></li>'
              echo '</ul>'
            done
            echo '</body></html>'
          } > index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
