name: Reusable docker build template
description: |
  This workflow builds the image for a specific architecture and pushes it to the registry.

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      runner:
        required: true
        type: string
      platform:
        required: true
        type: string
      registry:
        required: true
        type: string
      image-type:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      base-image:
        required: false
        type: string
        default: ''
      spec:
        required: false
        type: string
        default: ''
    outputs:
      image-uri:
        description: "The URI of the built image with digest"
        value: ${{ jobs.build-and-push.outputs.image-uri }}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ${{ inputs.runner }}
    outputs:
      # Digest-pinned, lowercased reference. Used both as a manifest source and
      # as the FROM (BASE_IMAGE) of the next layer, so it must be a valid docker
      # reference: lowercase repository (github.repository_owner is mixed-case)
      # and pinned by digest (avoids the metadata-action suffix being duplicated).
      image-uri: ${{ steps.imgref.outputs.lowercase }}@${{ steps.build.outputs.digest }}
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
          rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
          testing: false   
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve spack pins from key4hep-spack
        # Resolve the key4hep-spack main SHA once and read both pin files *at
        # that SHA*, so the spack commit, the spack-packages commit and the
        # key4hep-spack checkout (whose .cherry-pick targets that spack-packages
        # commit) stay mutually consistent within a run. Only Dockerfile.base
        # consumes these; the layer Dockerfile ignores the unused build-args.
        id: pins
        run: |
          k4sha=$(git ls-remote https://github.com/key4hep/key4hep-spack.git main | cut -f1)
          echo "k4sha=$k4sha" >> "$GITHUB_OUTPUT"
          base="https://raw.githubusercontent.com/key4hep/key4hep-spack/$k4sha"
          echo "spack=$(curl -fsSL "$base/.latest-commit" | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          echo "packages=$(curl -fsSL "$base/.latest-packages-commit" | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ github.repository_owner }}/mucoll-${{ inputs.image-type }}-${{ inputs.os }}
          flavor: latest=false,suffix=-${{ inputs.platform }}
      - name: Build and Push
        id: build
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/${{ inputs.platform }}
          context: ./Docker
          file: ./Docker/${{ inputs.dockerfile }}
          # On pull_request, github.sha is the ephemeral merge commit (absent from
          # the plain clone the Dockerfile does), so `git checkout` would fail.
          # Use the PR head repo+SHA instead; fall back to the push context.
          build-args: |
            OS=${{ inputs.os }}
            BASE_IMAGE=${{ inputs.base-image }}
            SPEC=${{ inputs.spec }}
            GITHUB_REPOSITORY=${{ github.event.pull_request.head.repo.full_name || github.repository }}
            MUCOLL_SHA=${{ github.event.pull_request.head.sha || github.sha }}
            SPACK_BUILDCACHE=oci://ghcr.io/${{ github.repository_owner }}/mucoll-buildcache
            OCI_USERNAME=${{ github.actor }}
            BRANCH=${{ github.ref_name }}
            SPACK_COMMIT=${{ steps.pins.outputs.spack }}
            SPACK_PACKAGES_COMMIT=${{ steps.pins.outputs.packages }}
            KEY4HEP_SPACK_SHA=${{ steps.pins.outputs.k4sha }}
          secrets: |
            "ocipass=${{ secrets.GITHUB_TOKEN }}"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Lowercase image name
        id: imgref
        uses: Entepotenz/change-string-case-action-min-dependencies@v1
        with:
          string: ${{ inputs.registry }}/${{ github.repository_owner }}/mucoll-${{ inputs.image-type }}-${{ inputs.os }}