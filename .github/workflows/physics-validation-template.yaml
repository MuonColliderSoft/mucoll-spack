name: Physics validation (tracking chain)
description: |
  Reusable per-particle physics-validation pipeline.
  Runs gen -> sim -> digi -> reco as independent jobs (each gets a fresh runner
  time budget), forwarding the output of each stage to the next as an artifact,
  then plots the TrackPerf histograms produced by the reconstruction.
  NOTE: tracking-performance plotting is currently disabled (DO_TRACK_PERF=0) until
  TrackPerfHistAlg is available in the image; the plot step writes a placeholder.

on:
  workflow_call:
    inputs:
      image:
        description: "Image to run the chain in (registry/owner/name:tag)"
        required: true
        type: string
      pdg:
        description: "PDG id of the gun particle (the particle label is inferred from this)"
        required: false
        type: string
        default: "-13"
      geometry:
        description: "Detector geometry name passed to setup_digireco.sh"
        required: false
        type: string
        default: MAIA_v0
      n-events:
        description: "Number of events"
        required: false
        type: string
        default: "1000"
      particles-per-event:
        description: "Particles generated per event"
        required: false
        type: string
        default: "1"
      pt-min:
        description: "Minimum transverse momentum [GeV]"
        required: false
        type: string
        default: "1"
      pt-max:
        description: "Maximum transverse momentum [GeV]"
        required: false
        type: string
        default: "10"
      theta-min:
        description: "Minimum polar angle [deg]"
        required: false
        type: string
        default: "10"
      theta-max:
        description: "Maximum polar angle [deg]"
        required: false
        type: string
        default: "170"

permissions:
  contents: read
  packages: read

# Pinned mucoll-benchmarks (samf25 fork, k4MuC-gen3 branch).
env:
  BENCHMARKS_REPO: https://github.com/samf25/mucoll-benchmarks.git
  BENCHMARKS_SHA: e1dc64078afa257a2d8498ee26962367805737ec

defaults:
  run:
    shell: bash

jobs:
  # Infer the particle label from the PDG id. Runs directly on the runner (no
  # container) so it adds no image pull. Used for artifact names + Pages subdir.
  meta:
    runs-on: ubuntu-latest
    outputs:
      particle: ${{ steps.map.outputs.particle }}
    steps:
      - id: map
        env:
          PDG: ${{ inputs.pdg }}
        run: |
          apdg=${PDG#-}   # drop sign: particle == antiparticle for labelling
          case "$apdg" in
            11)   name=electron ;;
            13)   name=muon ;;
            211)  name=pion ;;
            22)   name=photon ;;
            2112) name=neutron ;;
            *)    name="pdg${PDG}" ;;
          esac
          echo "Mapped PDG ${PDG} -> ${name}"
          echo "particle=${name}" >> "$GITHUB_OUTPUT"

  gen:
    needs: meta
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    steps:
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - name: Generation
        env:
          BM: ${{ github.workspace }}/benchmarks
          GEOM: ${{ inputs.geometry }}
          NEV: ${{ inputs.n-events }}
          PPE: ${{ inputs.particles-per-event }}
          PDG: ${{ inputs.pdg }}
          PTMIN: ${{ inputs.pt-min }}
          PTMAX: ${{ inputs.pt-max }}
          THMIN: ${{ inputs.theta-min }}
          THMAX: ${{ inputs.theta-max }}
        run: bash validation/run_chain.sh gen
      - uses: actions/upload-artifact@v7
        with:
          name: gen-${{ needs.meta.outputs.particle }}
          path: gen.edm4hep.root
          if-no-files-found: error

  sim:
    needs: [meta, gen]
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    steps:
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - uses: actions/download-artifact@v4
        with:
          name: gen-${{ needs.meta.outputs.particle }}
          path: .
      - name: Simulation
        env:
          BM: ${{ github.workspace }}/benchmarks
          GEOM: ${{ inputs.geometry }}
          NEV: ${{ inputs.n-events }}
        run: bash validation/run_chain.sh sim
      - uses: actions/upload-artifact@v7
        with:
          name: sim-${{ needs.meta.outputs.particle }}
          path: sim.edm4hep.root
          if-no-files-found: error

  digi:
    needs: [meta, sim]
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    steps:
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - uses: actions/download-artifact@v4
        with:
          name: sim-${{ needs.meta.outputs.particle }}
          path: .
      - name: Digitisation
        env:
          BM: ${{ github.workspace }}/benchmarks
          GEOM: ${{ inputs.geometry }}
        run: bash validation/run_chain.sh digi
      - uses: actions/upload-artifact@v7
        with:
          name: digi-${{ needs.meta.outputs.particle }}
          path: digi.edm4hep.root
          if-no-files-found: error

  reco:
    needs: [meta, digi]
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    steps:
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - uses: actions/download-artifact@v4
        with:
          name: digi-${{ needs.meta.outputs.particle }}
          path: .
      - name: Reconstruction
        env:
          BM: ${{ github.workspace }}/benchmarks
          GEOM: ${{ inputs.geometry }}
        run: bash validation/run_chain.sh reco
      - uses: actions/upload-artifact@v7
        with:
          name: reco-${{ needs.meta.outputs.particle }}
          # reco_histograms.root is only produced when --doTrackPerf is enabled
          # (DO_TRACK_PERF=1), which requires TrackPerfHistAlg in the image.
          path: |
            reco.edm4hep.root
            reco_histograms.root
          if-no-files-found: warn

  plot:
    needs: [meta, reco]
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: reco-${{ needs.meta.outputs.particle }}
          path: .
      - name: Make tracking-performance plots
        run: |
          source /opt/setup_mucoll.sh
          mkdir -p "public/${{ needs.meta.outputs.particle }}"
          if [ -f reco_histograms.root ]; then
            python validation/plot_tracking_perf.py \
              reco_histograms.root "public/${{ needs.meta.outputs.particle }}" \
              --particle "${{ needs.meta.outputs.particle }}"
          else
            echo "reco_histograms.root not produced (--doTrackPerf disabled: TrackPerfHistAlg unavailable). Writing placeholder."
            {
              echo '<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">'
              echo "<title>${{ needs.meta.outputs.particle }} — tracking performance</title></head><body>"
              echo "<h1>${{ needs.meta.outputs.particle }}: tracking performance (currently disabled)</h1>"
              echo '<p>gen → sim → digi → reco ran successfully, but no plots were produced:'
              echo '<code>reco_histograms.root</code> requires <code>TrackPerfHistAlg</code>,'
              echo 'which is not yet available in the image (<code>--doTrackPerf</code> is off).</p>'
              echo '</body></html>'
            } > "public/${{ needs.meta.outputs.particle }}/index.html"
          fi
      - name: Upload plots (per-particle Pages fragment)
        uses: actions/upload-artifact@v7
        with:
          name: pages-${{ needs.meta.outputs.particle }}
          path: public
          if-no-files-found: error
