name: Physics validation (tracking chain)
description: |
  Reusable per-particle physics-validation pipeline.
  Runs gen -> sim -> digi -> reco as independent jobs (each gets a fresh runner
  time budget), forwarding the output of each stage to the next as an artifact.
  The gen/sim/digi/reco chain is identical for every particle; the final "plot"
  job is the only per-study step (see validation/make_plots.sh).

  The mucoll-sim image is large, so jobs do NOT use a job-level `container:`
  (which pulls before any step runs and exhausts the runner disk). Instead each
  job frees disk first, then launches the container manually with docker run/exec.

on:
  workflow_call:
    inputs:
      image:
        description: "Image to run the chain in (registry/owner/name:tag)"
        required: true
        type: string
      pdg:
        description: "PDG id of the gun particle (the particle label is inferred from this)"
        required: false
        type: string
        default: "-13"
      geometry:
        description: "Detector geometry name passed to setup_digireco.sh"
        required: false
        type: string
        default: MAIA_v0
      n-events:
        description: "Number of events"
        required: false
        type: string
        default: "1000"
      particles-per-event:
        description: "Particles generated per event"
        required: false
        type: string
        default: "1"
      pt-min:
        description: "Minimum transverse momentum [GeV]"
        required: false
        type: string
        default: "1"
      pt-max:
        description: "Maximum transverse momentum [GeV]"
        required: false
        type: string
        default: "10"
      theta-min:
        description: "Minimum polar angle [deg]"
        required: false
        type: string
        default: "10"
      theta-max:
        description: "Maximum polar angle [deg]"
        required: false
        type: string
        default: "170"

permissions:
  contents: read

# Pinned mucoll-benchmarks (samf25 fork, k4MuC-gen3 branch).
env:
  BENCHMARKS_REPO: https://github.com/samf25/mucoll-benchmarks.git
  BENCHMARKS_SHA: e1dc64078afa257a2d8498ee26962367805737ec

defaults:
  run:
    shell: bash

jobs:
  # Infer the particle label from the PDG id. Runs directly on the runner (no
  # container) so it adds no image pull. Used for artifact names + Pages subdir.
  meta:
    runs-on: ubuntu-latest
    outputs:
      particle: ${{ steps.map.outputs.particle }}
    steps:
      - id: map
        env:
          PDG: ${{ inputs.pdg }}
        run: |
          apdg=${PDG#-}   # drop sign: particle == antiparticle for labelling
          case "$apdg" in
            11)   name=electron ;;
            13)   name=muon ;;
            211)  name=pion ;;
            22)   name=photon ;;
            2112) name=neutron ;;
            *)    name="pdg${PDG}" ;;
          esac
          echo "Mapped PDG ${PDG} -> ${name}"
          echo "particle=${name}" >> "$GITHUB_OUTPUT"

  gen:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - name: Launch container
        # The mucoll-sim image is a public GHCR package, so no docker login is needed.
        run: |
          docker run -d --name ci --privileged --entrypoint tail \
            -v "${GITHUB_WORKSPACE}:/work" -w /work "${{ inputs.image }}" -f /dev/null
      - name: Generation
        run: |
          docker exec -w /work \
            -e BM=/work/benchmarks \
            -e GEOM="${{ inputs.geometry }}" \
            -e NEV="${{ inputs.n-events }}" \
            -e PPE="${{ inputs.particles-per-event }}" \
            -e PDG="${{ inputs.pdg }}" \
            -e PTMIN="${{ inputs.pt-min }}" \
            -e PTMAX="${{ inputs.pt-max }}" \
            -e THMIN="${{ inputs.theta-min }}" \
            -e THMAX="${{ inputs.theta-max }}" \
            ci /bin/bash /work/validation/run_chain.sh gen
      - uses: actions/upload-artifact@v7
        with:
          name: gen-${{ needs.meta.outputs.particle }}
          path: gen.edm4hep.root
          if-no-files-found: error

  sim:
    needs: [meta, gen]
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - uses: actions/download-artifact@v8
        with:
          name: gen-${{ needs.meta.outputs.particle }}
          path: .
      - name: Launch container
        # The mucoll-sim image is a public GHCR package, so no docker login is needed.
        run: |
          docker run -d --name ci --privileged --entrypoint tail \
            -v "${GITHUB_WORKSPACE}:/work" -w /work "${{ inputs.image }}" -f /dev/null
      - name: Simulation
        run: |
          docker exec -w /work \
            -e BM=/work/benchmarks \
            -e GEOM="${{ inputs.geometry }}" \
            -e NEV="${{ inputs.n-events }}" \
            ci /bin/bash /work/validation/run_chain.sh sim
      - uses: actions/upload-artifact@v7
        with:
          name: sim-${{ needs.meta.outputs.particle }}
          path: sim.edm4hep.root
          if-no-files-found: error

  digi:
    needs: [meta, sim]
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - uses: actions/download-artifact@v8
        with:
          name: sim-${{ needs.meta.outputs.particle }}
          path: .
      - name: Launch container
        # The mucoll-sim image is a public GHCR package, so no docker login is needed.
        run: |
          docker run -d --name ci --privileged --entrypoint tail \
            -v "${GITHUB_WORKSPACE}:/work" -w /work "${{ inputs.image }}" -f /dev/null
      - name: Digitisation
        run: |
          docker exec -w /work \
            -e BM=/work/benchmarks \
            -e GEOM="${{ inputs.geometry }}" \
            ci /bin/bash /work/validation/run_chain.sh digi
      - uses: actions/upload-artifact@v7
        with:
          name: digi-${{ needs.meta.outputs.particle }}
          path: digi.edm4hep.root
          if-no-files-found: error

  reco:
    needs: [meta, digi]
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - uses: actions/download-artifact@v8
        with:
          name: digi-${{ needs.meta.outputs.particle }}
          path: .
      - name: Launch container
        # The mucoll-sim image is a public GHCR package, so no docker login is needed.
        run: |
          docker run -d --name ci --privileged --entrypoint tail \
            -v "${GITHUB_WORKSPACE}:/work" -w /work "${{ inputs.image }}" -f /dev/null
      - name: Reconstruction
        run: |
          docker exec -w /work \
            -e BM=/work/benchmarks \
            -e GEOM="${{ inputs.geometry }}" \
            ci /bin/bash /work/validation/run_chain.sh reco
      - uses: actions/upload-artifact@v7
        with:
          name: reco-${{ needs.meta.outputs.particle }}
          path: reco.edm4hep.root
          if-no-files-found: error

  plot:
    needs: [meta, reco]
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false
      - uses: actions/checkout@v6
      - name: Clone benchmarks
        run: |
          git clone "${BENCHMARKS_REPO}" benchmarks
          git -C benchmarks checkout "${BENCHMARKS_SHA}"
      - uses: actions/download-artifact@v8
        with:
          name: reco-${{ needs.meta.outputs.particle }}
          path: .
      - name: Launch container
        # The mucoll-sim image is a public GHCR package, so no docker login is needed.
        run: |
          docker run -d --name ci --privileged --entrypoint tail \
            -v "${GITHUB_WORKSPACE}:/work" -w /work "${{ inputs.image }}" -f /dev/null
      - name: Make tracking plots
        run: |
          docker exec -w /work \
            -e BM=/work/benchmarks \
            -e GEOM="${{ inputs.geometry }}" \
            -e NEV="${{ inputs.n-events }}" \
            -e PPE="${{ inputs.particles-per-event }}" \
            -e PDG="${{ inputs.pdg }}" \
            -e PTMIN="${{ inputs.pt-min }}" \
            -e PTMAX="${{ inputs.pt-max }}" \
            -e THMIN="${{ inputs.theta-min }}" \
            -e THMAX="${{ inputs.theta-max }}" \
            ci /bin/bash /work/validation/make_plots.sh "${{ needs.meta.outputs.particle }}"
      - name: Upload plots (per-particle Pages fragment)
        uses: actions/upload-artifact@v7
        with:
          name: pages-${{ needs.meta.outputs.particle }}
          path: public
          if-no-files-found: error
